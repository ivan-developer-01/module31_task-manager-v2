<form id="app-login-form" class="d-flex">
	<input
		class="form-control me-2"
		name="login"
		autocomplete="username"
		type="text"
		placeholder="Login"
		data-i18n-placeholder="login"
		aria-label="Login"
		required
	/>
	<input
		class="form-control me-2"
		name="password"
		autocomplete="current-password"
		type="password"
		placeholder="Password"
		data-i18n-placeholder="password"
		aria-label="Password"
		required
	/>
	<button id="app-login-btn" class="btn btn-outline-info" type="submit" data-i18n="sign-in">Sign In</button>
</form>
