<form id="profile-edit-form">
	<div class="mb-3">
		<label for="login-input" class="form-label" data-i18n="login">Login</label>
		<input name="login" type="text" class="form-control" id="login-input">
	</div>
	<div class="mb-3">
		<label for="current-password-input" class="form-label" data-i18n="current-password">Current password</label>
		<input name="current-password" type="password" class="form-control" id="current-password-input">
		<div class="form-text text-white" data-i18n="profile-settings-leave-password-empty">Leave all password fields empty if you are not changing your password.</div>
	</div>
	<div class="mb-3">
		<label for="new-password-input" class="form-label" data-i18n="new-password">New password</label>
		<input name="new-password" type="password" class="form-control" id="new-password-input">
	</div>
	<div class="mb-3">
		<label for="confirm-new-password-input" class="form-label" data-i18n="confirm-new-password">Confirm new password</label>
		<input name="confirm-new-password" type="password" class="form-control" id="confirm-new-password-input">
	</div>
	<div class="btn-group">
		<button type="submit" class="btn btn-primary save-btn" data-i18n="save">Save</button>
		<button class="btn btn-danger cancel-btn" data-i18n="cancel">Cancel</button>
		<button class="btn btn-secondary back-btn" data-i18n="go-back-to-tasks">Go back to tasks</button>
	</div>
</form>
